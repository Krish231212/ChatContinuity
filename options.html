<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatContinuity Options</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 540px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      padding: 32px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
    }

    .title-area h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title-area p {
      margin: 4px 0 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      width: 100%;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .checkbox-group {
      flex-direction: row;
      align-items: center;
      gap: 12px;
      margin: 16px 0 24px 0;
      cursor: pointer;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      flex: 1;
      padding: 11px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #status-message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      margin-top: 18px;
      animation: fadeIn 0.3s ease;
    }

    #status-message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
      display: block;
    }

    #status-message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <img src="assets/icon.png" alt="ChatContinuity" class="logo-img">
    <div class="title-area">
      <h1>ChatContinuity</h1>
      <p>Configure project memory settings & API settings</p>
    </div>
  </div>

  <form id="settings-form">
    <div class="form-group">
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
    </div>

    <div class="form-group">
      <label for="api-base-url">API Base URL</label>
      <input type="text" id="api-base-url" placeholder="https://api.openai.com/v1">
      <span style="font-size: 11.5px; color: var(--text-muted); line-height: 1.3;">
        For free AI, use OpenRouter (<code style="color:#60a5fa;">https://openrouter.ai/api/v1</code>) with their free models, or local Ollama (<code style="color:#60a5fa;">http://localhost:11434/v1</code>).
      </span>
    </div>

    <div class="form-group">
      <label for="model-select">GPT Model</label>
      <select id="model-select">
        <option value="gpt-4o">GPT-4o (Recommended)</option>
        <option value="gpt-4o-mini">GPT-4o Mini (Fast & Cost-efficient)</option>
        <option value="gpt-4">GPT-4</option>
        <option value="custom">Custom Model...</option>
      </select>
    </div>

    <div class="form-group" id="custom-model-group" style="display: none;">
      <label for="custom-model-input">Custom Model Name</label>
      <input type="text" id="custom-model-input" placeholder="e.g. gpt-4.1">
    </div>

    <div class="form-group">
      <label for="threshold-input">Message Threshold (Alert Trigger)</label>
      <input type="number" id="threshold-input" min="1" max="1000" placeholder="250">
    </div>

    <div class="form-group">
      <label for="frequency-input">Memory Update Frequency (Turns)</label>
      <input type="number" id="frequency-input" min="1" max="100" placeholder="10">
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" id="auto-popup-checkbox">
      <label for="auto-popup-checkbox" style="cursor: pointer;">Enable floating popups on large conversations</label>
    </div>

    <div class="button-group">
      <button type="button" id="btn-test" class="btn-secondary">Test Connection</button>
      <button type="submit" class="btn-primary">Save Settings</button>
    </div>
  </form>

  <div id="status-message"></div>
</div>

<script type="module" src="options.js"></script>
</body>
</html>
